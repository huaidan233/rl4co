_target_: rl4co.envs.landuseOptEnv
name: luop

generator_params:
  num_loc: 50
  loc_distribution: uniform
  num_fixed: 3

objective_weights: [0.5, 0.5]
eval_objective_weights: [0.5, 0.5]
objective_scalarization: linear
objective_ideal: [1.0, 1.0]
sample_objective_weights: true
sample_eval_objective_weights: false
objective_weight_min: 0.0
min_type_ratios: null

data_dir: ${paths.root_dir}/data/luop
val_file: luop${env.generator_params.num_loc}_val_seed4321.npz
test_file: luop${env.generator_params.num_loc}_test_seed1234.npz
